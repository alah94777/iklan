<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GForge Cloud Network</title>
  <style>
    body { font-family: sans-serif; background: #0b0f19; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 200vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .content { text-align: center; max-width: 500px; background: #111827; padding: 40px; border-radius: 12px; border: 1px solid #1f2937; margin-top: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    h1 { color: #10b981; }
    .status-bar { color: #6b7280; font-size: 13px; margin-top: 20px; font-family: monospace; }
  </style>
</head>
<body>

  <div class="content">
    <h1>GForge Secure Gateway</h1>
    <p>Processing secure protocol... Please keep this page active.</p>
    <div class="status-bar">Traffic Verified | Session: <span id="session"></span></div>
  </div>

  <script>
    // URL Smartlink Adsterra resmi dengan ID milikmu
    const URL_SMARTLINK = "https://www.highratecpm.com/30306633"; 

    window.onload = function() {
      // Bikin string session acak biar dikira user unik oleh tracker
      document.getElementById('session').innerText = Math.random().toString(36).substring(2, 11).toUpperCase();

      // 1. Eksekusi Utama: Tembak Smartlink di tab baru (Popunder)
      try {
        window.open(URL_SMARTLINK, '_blank');
      } catch(e) {
        // Fallback jika diblokir: paksa buka di halaman yang sama
        console.log("Popunder blocked, triggering gateway fallback...");
      }

      // 2. Kamuflase Perilaku: Simulasi Scroll Manusia
      // Bot diam, tapi browser otomatis melakukan scroll naik-turun acak tiap 3 detik
      setInterval(() => {
        const arahScroll = Math.random() > 0.5 ? 1 : -1;
        const jarakScroll = (Math.floor(Math.random() * 250) + 50) * arahScroll;
        window.scrollBy({ top: jarakScroll, behavior: 'smooth' });
      }, 3000);

      // 3. Rotasi Impresi: Auto Reload Dinamis
      // Mengubah waktu stay time bot secara acak antara 20 - 45 detik sebelum refresh link baru
      const randomStayTime = (Math.floor(Math.random() * 25) + 20) * 1000;
      
      setTimeout(() => {
        window.location.reload();
      }, randomStayTime);
    };
  </script>
</body>
</html>
